services:
  postgres:
    image: postgres:16
    container_name: wordapp-postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: wordapp
      POSTGRES_PASSWORD: wordapp
      POSTGRES_DB: wordapp
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: wordapp-redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data: